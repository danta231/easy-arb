# 同机部署 Nginx（反向代理服务器）示例。
# 中文说明：
# - Easy Tool 的 Node.js（JavaScript 运行时）服务使用 8787。
# - easy-arb HTML dashboard 已迁移到 Easy Tool；如需公开，只代理 portfolio JSON API（组合状态接口）。
# - 上线前把 server_name 和证书配置替换为真实域名。

upstream easy_tool_runtime {
    server 127.0.0.1:8787;
    keepalive 16;
}

upstream easy_arb_portfolio {
    server 127.0.0.1:8805;
    keepalive 8;
}

server {
    listen 80;
    server_name easy-tool.example.com;

    root /opt/easy-tool/current/dist;
    index index.html;
    client_max_body_size 16m;

    # 当前 Easy Tool runtime API（运行时接口）没有完整应用级认证；
    # 若未接入 VPN（虚拟专用网络）或统一身份代理，保留 Basic Auth（基础认证）。
    auth_basic "Easy Tool";
    auth_basic_user_file /etc/nginx/.htpasswd-easy-tool;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://easy_tool_runtime;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|mjs|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name easy-arb.example.com;

    client_max_body_size 4m;

    # 交易与账户 JSON API 不要裸露公网。生产建议优先走 VPN、SSH tunnel（SSH 隧道）或 Easy Tool 内部代理。
    auth_basic "Easy Arb";
    auth_basic_user_file /etc/nginx/.htpasswd-easy-arb;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://easy_arb_portfolio;
    }
}
