<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统导航</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101112;
      --band: #17191b;
      --panel: #1d2023;
      --line: #373c42;
      --line-soft: #2a2f34;
      --text: #f3ead8;
      --muted: #a8adb2;
      --accent: #d7b25d;
      --good: #5dc48a;
      --bad: #e16d6d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "IBM Plex Sans", "SF Pro Text", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }
    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      background: var(--band);
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 20px; line-height: 1.25; font-weight: 650; letter-spacing: 0; }
    main { padding: 16px 22px 28px; }
    button, input {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #202429;
      color: var(--text);
      padding: 7px 10px;
      font: inherit;
    }
    button { cursor: pointer; }
    button:hover, input:focus { border-color: var(--accent); outline: none; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab.active { border-color: var(--accent); color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .entry {
      min-height: 122px;
      display: grid;
      gap: 10px;
      align-content: start;
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: var(--panel);
      padding: 12px;
    }
    .entry h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
      font-weight: 650;
    }
    .desc { color: var(--muted); line-height: 1.45; min-height: 40px; }
    .links { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 10px;
      background: #171a1d;
    }
    a:hover { border-color: var(--accent); color: var(--accent); }
    .health { color: var(--muted); }
    .health.ok { color: var(--good); border-color: rgba(93, 196, 138, .5); }
    .health.bad { color: var(--bad); border-color: rgba(225, 109, 109, .55); }
    .subtle { color: var(--muted); font-size: 12px; }
    .empty {
      display: none;
      padding: 18px;
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
    }
    @media (max-width: 780px) {
      header { grid-template-columns: 1fr; padding: 16px; }
      main { padding: 14px 16px 22px; }
      .toolbar { align-items: stretch; }
      input, button { width: 100%; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>系统导航</h1>
      <div id="updated" class="subtle">加载中</div>
    </div>
    <button id="refresh" type="button">刷新</button>
  </header>
  <main>
    <section class="toolbar" aria-label="筛选">
      <input id="search" type="search" placeholder="搜索页面、交易所、策略">
      <button type="button" data-open="/dashboard">组合看板</button>
      <button type="button" data-open="/api/navigation/pages">导航接口</button>
    </section>
    <section id="tabs" class="tabs" aria-label="分类"></section>
    <section id="grid" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty">没有匹配的页面</div>
  </main>
  <script>
    const state = { pages: [], category: "全部", query: "" };
    const LOCAL_TIME_ZONE = "Asia/Shanghai";
    const LOCAL_TIME_ZONE_LABEL = "UTC+8";
    const grid = document.getElementById("grid");
    const tabs = document.getElementById("tabs");
    const empty = document.getElementById("empty");
    const updated = document.getElementById("updated");
    const search = document.getElementById("search");

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[ch]));
    }

    function parsedTimestampMs(value) {
      const text = String(value ?? "").trim();
      if (!text || text === "not-yet-updated" || text === "timestamp-unavailable") return null;
      const normalized = text.replace(/\.(\d{3})\d+(Z|[+-]\d{2}:?\d{2})$/, ".$1$2");
      const parsed = Date.parse(normalized);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function localTimestamp(value) {
      const parsed = parsedTimestampMs(value);
      if (parsed === null) return value || "-";
      const rendered = new Date(parsed).toLocaleString("zh-CN", {
        timeZone: LOCAL_TIME_ZONE,
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
      return `${rendered} ${LOCAL_TIME_ZONE_LABEL}`;
    }

    function categories() {
      return ["全部", ...Array.from(new Set(state.pages.map(page => page.category))).sort()];
    }

    function renderTabs() {
      tabs.innerHTML = categories().map(category => `
        <button type="button" class="tab ${category === state.category ? "active" : ""}" data-category="${esc(category)}">${esc(category)}</button>
      `).join("");
    }

    function matches(page) {
      const query = state.query.trim().toLowerCase();
      const text = `${page.category} ${page.title} ${page.description} ${page.url}`.toLowerCase();
      return (state.category === "全部" || page.category === state.category) && (!query || text.includes(query));
    }

    function renderGrid() {
      const rows = state.pages.filter(matches);
      grid.innerHTML = rows.map(page => `
        <article class="entry">
          <h2>${esc(page.title)}</h2>
          <div class="desc">${esc(page.description)}</div>
          <div class="subtle">${esc(page.category)}</div>
          <div class="links">
            <a href="${esc(page.url)}" target="_blank" rel="noreferrer">打开</a>
            <a class="health" href="${esc(page.health_url)}" target="_blank" rel="noreferrer" data-health="${esc(page.health_url)}">健康</a>
          </div>
        </article>
      `).join("");
      empty.style.display = rows.length ? "none" : "block";
      checkHealth();
    }

    async function fetchHealth(url) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 2500);
      try {
        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        return response.ok;
      } catch (_) {
        return false;
      } finally {
        clearTimeout(timer);
      }
    }

    async function checkHealth() {
      const links = Array.from(document.querySelectorAll("[data-health]"));
      const urls = Array.from(new Set(links.map(link => link.dataset.health).filter(Boolean)));
      const results = new Map(await Promise.all(urls.map(async url => [url, await fetchHealth(url)])));
      for (const link of links) {
        const ok = results.get(link.dataset.health) === true;
        link.classList.toggle("ok", ok);
        link.classList.toggle("bad", !ok);
      }
    }

    function render() {
      renderTabs();
      renderGrid();
    }

    async function load() {
      const response = await fetch("/api/navigation/pages", { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      state.pages = data.pages || [];
      updated.textContent = `页面 ${state.pages.length} 个，更新时间 ${localTimestamp(data.updated_at)}`;
      render();
    }

    document.getElementById("refresh").addEventListener("click", load);
    search.addEventListener("input", event => {
      state.query = event.target.value;
      renderGrid();
    });
    tabs.addEventListener("click", event => {
      const category = event.target?.dataset?.category;
      if (!category) return;
      state.category = category;
      render();
    });
    document.querySelectorAll("[data-open]").forEach(button => {
      button.addEventListener("click", () => window.open(button.dataset.open, "_blank", "noreferrer"));
    });
    load().catch(error => {
      updated.textContent = `加载失败：${error.message}`;
    });
  </script>
</body>
</html>
